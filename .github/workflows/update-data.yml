name: Update Serie A Seed Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  update-seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update seed CSV from Football-Data
        env:
          FOOTBALL_DATA_SERIE_A_URL: ${{ vars.FOOTBALL_DATA_SERIE_A_URL }}
        run: python scripts/update_football_data_seed.py

      - name: Commit and push changes if needed
        run: |
          if git diff --quiet -- data/raw/serie_a_seed.csv; then
            echo "No seed changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/serie_a_seed.csv
          git commit -m "chore: update Serie A seed data"
          git push
