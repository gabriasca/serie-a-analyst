name: Update Serie A Fixtures Seed

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * *"

permissions:
  contents: write

jobs:
  update-fixtures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Serie A fixture seed CSV
        env:
          FOOTBALL_DATA_SERIE_A_FIXTURES_URL: ${{ vars.FOOTBALL_DATA_SERIE_A_FIXTURES_URL }}
        run: python scripts/update_serie_a_fixtures_seed.py

      - name: Commit and push changes if needed
        run: |
          if git diff --quiet -- data/raw/serie_a_fixtures_seed.csv; then
            echo "No fixture changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/serie_a_fixtures_seed.csv
          git commit -m "chore: update Serie A fixture seed"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
